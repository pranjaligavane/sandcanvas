<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sand Art Studio – Advanced Generative Painting</title>
  <meta name="description"
    content="Interactive sand art studio with layers, recording, export, symmetry controls, and advanced generative effects.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.18);
      --glass-shadow: rgba(0, 0, 0, 0.25);
      --accent: #c9a7eb;
      --text: rgba(255, 255, 255, 0.9);
      --text-muted: rgba(255, 255, 255, 0.55);
      --panel-width: 330px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0a14;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      cursor: crosshair;
      touch-action: none;
    }

    #guideCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      pointer-events: none;
      z-index: 1;
      display: none;
    }

    #panel {
      position: fixed;
      top: 50%;
      right: 18px;
      transform: translateY(-50%);
      width: var(--panel-width);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      border-radius: 20px;
      padding: 18px 16px;
      box-shadow: 0 8px 40px var(--glass-shadow);
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 10;
      max-height: 96vh;
      overflow-y: auto;
      scrollbar-width: none;
    }

    #panel::-webkit-scrollbar {
      display: none;
    }

    .panel-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.04em;
      text-align: center;
    }

    .panel-title span {
      background: linear-gradient(90deg, #f9c5d1, #c9a7eb, #a7c9eb, #a7ebd4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .mode-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 10px;
      font-weight: 500;
      padding: 7px 4px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      line-height: 1.3;
    }

    .mode-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, rgba(201, 167, 235, 0.35), rgba(167, 201, 235, 0.25));
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 12px rgba(201, 167, 235, 0.3);
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .ctrl-row label {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .ctrl-row .val {
      font-size: 11px;
      color: var(--text);
      min-width: 26px;
      text-align: right;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(201, 167, 235, 0.6);
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.25);
    }

    input[type=range]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(201, 167, 235, 0.6);
      cursor: pointer;
      border: none;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .swatch:hover {
      transform: scale(1.2);
    }

    .swatch.active {
      border-color: #fff;
      transform: scale(1.15);
    }

    input[type=color] {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.25);
      background: none;
      cursor: pointer;
      padding: 0;
      overflow: hidden;
    }

    input[type=color]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    input[type=color]::-webkit-color-swatch {
      border: none;
      border-radius: 50%;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 8px 6px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn.accent {
      background: linear-gradient(135deg, rgba(201, 167, 235, 0.4), rgba(167, 201, 235, 0.3));
      border-color: var(--accent);
    }

    .btn.danger {
      border-color: rgba(255, 120, 120, 0.4);
    }

    .btn.danger:hover {
      background: rgba(255, 100, 100, 0.18);
    }

    #stats {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.06em;
    }

    #panel-toggle {
      position: fixed;
      right: 18px;
      top: 14px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 20;
      font-size: 18px;
      color: var(--text);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s;
    }

    #panel-toggle:hover {
      transform: scale(1.1);
    }

    .audio-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .toggle-track {
      width: 36px;
      height: 18px;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      position: relative;
      transition: background 0.25s;
      flex-shrink: 0;
    }

    .toggle-track.on {
      background: linear-gradient(90deg, rgba(201, 167, 235, 0.6), rgba(167, 201, 235, 0.5));
    }

    .toggle-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.25s;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
    }

    .toggle-track.on .toggle-thumb {
      transform: translateX(18px);
    }

    .audio-label {
      font-size: 11px;
      color: var(--text-muted);
    }

    .sound-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      margin-top: 6px;
    }

    .sound-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 9.5px;
      padding: 5px 3px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .sound-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .sound-btn.active {
      background: linear-gradient(135deg, rgba(201, 167, 235, 0.3), rgba(167, 201, 235, 0.2));
      border-color: var(--accent);
      color: #fff;
    }

    #audioViz {
      width: 100%;
      height: 24px;
      border-radius: 6px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: flex-end;
      gap: 2px;
      padding: 3px;
      box-sizing: border-box;
    }

    .viz-bar {
      flex: 1;
      border-radius: 2px;
      background: linear-gradient(to top, #c9a7eb, #a7c9eb);
      transition: height 0.06s ease;
      min-height: 2px;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    #tooltip {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 11px;
      color: var(--text-muted);
      pointer-events: none;
      z-index: 5;
      white-space: nowrap;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    .preset-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 9px;
      padding: 5px 3px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .preset-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }

    .preset-btn.active {
      background: linear-gradient(135deg, rgba(201, 167, 235, 0.3), rgba(167, 201, 235, 0.2));
      border-color: var(--accent);
      color: #fff;
    }

    .palette-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .pal-swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .pal-swatch:hover {
      transform: scale(1.2);
    }

    .pal-swatch.active {
      border-color: #fff;
      transform: scale(1.15);
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(5, 2, 12, 0.55) 100%);
    }

    #brushCursor {
      position: fixed;
      pointer-events: none;
      z-index: 3;
      border-radius: 50%;
      border: 1.5px solid rgba(201, 167, 235, 0.5);
      box-shadow: 0 0 10px rgba(201, 167, 235, 0.3), inset 0 0 8px rgba(201, 167, 235, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.1s, height 0.1s;
      display: none;
    }

    body.focus-mode #panel {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    body.focus-mode #panel-toggle {
      opacity: 0;
      pointer-events: none;
    }

    body.focus-mode #focusHint {
      opacity: 1;
    }

    body.focus-mode #actionBar {
      opacity: 0;
      pointer-events: none;
    }

    body.focus-mode #layerIndicator {
      opacity: 0;
      pointer-events: none;
    }

    #focusHint {
      position: fixed;
      bottom: 12px;
      right: 12px;
      z-index: 20;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
      font-family: 'Inter', sans-serif;
    }

    #actionBar {
      position: fixed;
      bottom: 18px;
      left: 18px;
      z-index: 20;
      display: flex;
      gap: 8px;
      transition: opacity 0.5s;
    }

    .act-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      color: var(--text);
      transition: transform 0.2s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .act-btn:hover {
      transform: scale(1.12);
    }

    .sym-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .sym-btn {
      flex: 1;
      min-width: 32px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 7px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 9px;
      padding: 4px 2px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .sym-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .sym-btn.active {
      border-color: var(--accent);
      color: #fff;
      background: linear-gradient(135deg, rgba(201, 167, 235, 0.3), rgba(167, 201, 235, 0.2));
    }

    #layerIndicator {
      position: fixed;
      left: 18px;
      top: 14px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 10px;
      color: var(--text-muted);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      z-index: 20;
      transition: opacity 0.5s;
    }

    .toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 11px;
      color: var(--text);
      z-index: 100;
      pointer-events: none;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateX(-50%) translateY(40px);
        opacity: 0;
      }

      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>
  <canvas id="guideCanvas"></canvas>
  <div id="vignette"></div>
  <div id="brushCursor"></div>
  <div id="focusHint">Press F to exit focus mode</div>
  <div id="layerIndicator">Layer 1</div>
  <div id="actionBar">
    <div class="act-btn" id="undoBtn" title="Undo (Ctrl+Z)">↩</div>
    <div class="act-btn" id="redoBtn" title="Redo (Ctrl+Y)">↪</div>
    <div class="act-btn" id="replayBtn" title="Record/Replay">⏺</div>
    <div class="act-btn" id="saveBtn" title="Save as PNG">💾</div>
    <div class="act-btn" id="focusBtn" title="Focus Mode (F)">🔲</div>
  </div>
  <div id="panel-toggle" title="Toggle panel">⚙</div>
  <div id="panel">
    <div class="panel-title"><span>✦ Sand Art Studio</span></div>
    <div>
      <div class="section-label">Quick Presets</div>
      <div class="preset-grid">
        <button class="preset-btn" data-preset="mandala">🔮 Calm Mandala</button>
        <button class="preset-btn" data-preset="ocean">🌊 Ocean Drift</button>
        <button class="preset-btn" data-preset="desert">🏜 Desert Dunes</button>
        <button class="preset-btn" data-preset="floral">🌸 Floral Bloom</button>
        <button class="preset-btn" data-preset="cosmic" style="grid-column:span 2">✨ Cosmic Sand</button>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="section-label">Pattern Mode</div>
      <div class="mode-grid">
        <button class="mode-btn active" data-mode="gradient" id="btn-gradient">🌈<br>Gradient Flow</button>
        <button class="mode-btn" data-mode="mandala" id="btn-mandala">🔮<br>Spiral Mandala</button>
        <button class="mode-btn" data-mode="wave" id="btn-wave">🌊<br>Wave Flow</button>
        <button class="mode-btn" data-mode="chaos" id="btn-chaos">🌀<br>Chaotic Art</button>
        <button class="mode-btn" data-mode="fractal" id="btn-fractal">🌿<br>Fractal Drift</button>
        <button class="mode-btn" data-mode="bloom" id="btn-bloom">🌸<br>Particle Bloom</button>
        <button class="mode-btn" data-mode="dune" style="grid-column:span 2">🏜<br>Gravity Dune</button>
      </div>
    </div>
    <div id="mandalaControls" style="display:none">
      <div class="section-label">Mandala Symmetry</div>
      <div class="sym-row">
        <button class="sym-btn" data-folds="4">4×</button>
        <button class="sym-btn" data-folds="6">6×</button>
        <button class="sym-btn active" data-folds="8">8×</button>
        <button class="sym-btn" data-folds="12">12×</button>
        <button class="sym-btn" data-folds="16">16×</button>
      </div>
      <div class="ctrl-row" style="margin-top:7px;">
        <label>Mirror</label>
        <div class="toggle-track" id="mirrorTrack" style="cursor:pointer;">
          <div class="toggle-thumb"></div>
        </div>
        <span class="audio-label" id="mirrorLabel">Off</span>
      </div>
      <div class="ctrl-row" style="margin-top:7px;">
        <label>Guides</label>
        <div class="toggle-track" id="guideTrack" style="cursor:pointer;">
          <div class="toggle-thumb"></div>
        </div>
        <span class="audio-label" id="guideLabel">Off</span>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="section-label">Color</div>
      <div class="color-row" id="swatches"></div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
        <input type="color" id="colorPicker" value="#f9c5d1" title="Custom color">
        <button class="btn" id="randomPalette" style="font-size:10px;">🎲 Random</button>
      </div>
      <div class="section-label" style="margin-top:10px;">Sand Palettes</div>
      <div class="palette-row" id="namedPalettes"></div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="section-label">Brush</div>
      <div class="ctrl-row">
        <label>Size</label>
        <input type="range" id="brushSize" min="5" max="80" value="28">
        <span class="val" id="brushSizeVal">28</span>
      </div>
      <div class="ctrl-row" style="margin-top:8px;">
        <label>Density</label>
        <input type="range" id="density" min="1" max="20" value="8">
        <span class="val" id="densityVal">8</span>
      </div>
      <div class="ctrl-row" style="margin-top:8px;">
        <label>Speed</label>
        <input type="range" id="speed" min="1" max="10" value="4">
        <span class="val" id="speedVal">4</span>
      </div>
      <div class="ctrl-row" style="margin-top:8px;">
        <label>Glow</label>
        <input type="range" id="glow" min="0" max="20" value="3">
        <span class="val" id="glowVal">3</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="btn-row">
      <button class="btn accent" id="pauseBtn">⏸ Pause</button>
      <button class="btn danger" id="clearBtn">🗑 Clear</button>
    </div>
    <div class="divider"></div>
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div class="section-label" style="margin:0">🎵 Creative Flow Sound</div>
        <div class="audio-toggle" id="audioToggle">
          <div class="toggle-track" id="audioTrack">
            <div class="toggle-thumb"></div>
          </div>
          <span class="audio-label" id="audioLabel">Off</span>
        </div>
      </div>
      <div class="ctrl-row">
        <label>Volume</label>
        <input type="range" id="audioVolume" min="0" max="100" value="60">
        <span class="val" id="audioVolumeVal">60</span>
      </div>
      <div class="sound-grid" style="margin-top:10px;">
        <button class="sound-btn active" data-sound="sand">🏖 Soft Sand</button>
        <button class="sound-btn" data-sound="piano">🎹 Breeze</button>
        <button class="sound-btn" data-sound="ocean">🌊 Ocean Foam</button>
        <button class="sound-btn" data-sound="ambient">✨ Cinematic</button>
      </div>
      <div id="audioViz" style="margin-top:8px;">
        <div class="viz-bar" id="vb0"></div>
        <div class="viz-bar" id="vb1"></div>
        <div class="viz-bar" id="vb2"></div>
        <div class="viz-bar" id="vb3"></div>
        <div class="viz-bar" id="vb4"></div>
        <div class="viz-bar" id="vb5"></div>
        <div class="viz-bar" id="vb6"></div>
        <div class="viz-bar" id="vb7"></div>
      </div>
    </div>
    <div id="stats">Particles: 0 | History: 0</div>
  </div>
  <div id="tooltip">Tap or Click & drag to paint • Scroll to resize brush • F for focus mode</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const guideCanvas = document.getElementById('guideCanvas');
    const guideCtx = guideCanvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; guideCanvas.width = W; guideCanvas.height = H; }
    resize();
    window.addEventListener('resize', resize);
    let particles = [], mode = 'gradient', paused = false, isDrawing = false;
    let mouse = { x: W / 2, y: H / 2, vx: 0, vy: 0, px: W / 2, py: H / 2 };
    let brushSize = 28, density = 8, speedMult = 4, glowAmount = 3, currentColor = '#f9c5d1', time = 0, panelVisible = window.innerWidth > 768;
    if (!panelVisible) { document.getElementById('panel').style.display = 'none'; }

    // History System
    class HistoryState {
      constructor(particlesData, canvasImage) {
        this.particlesData = JSON.parse(JSON.stringify(particlesData));
        this.canvasImage = canvasImage;
      }
    }
    let history = [], historyIndex = -1;
    function saveHistory() {
      history = history.slice(0, historyIndex + 1);
      const imageData = ctx.getImageData(0, 0, W, H);
      const state = new HistoryState(particles, imageData);
      history.push(state);
      historyIndex++;
      if (history.length > 50) { history.shift(); historyIndex--; }
      updateHistoryUI();
    }
    function undo() { if (historyIndex > 0) { historyIndex--; restoreHistory(historyIndex); showToast('↩ Undo'); } }
    function redo() { if (historyIndex < history.length - 1) { historyIndex++; restoreHistory(historyIndex); showToast('↪ Redo'); } }
    function restoreHistory(index) {
      if (index < 0 || index >= history.length) return;
      const state = history[index];
      particles = JSON.parse(JSON.stringify(state.particlesData));
      ctx.putImageData(state.canvasImage, 0, 0);
      updateHistoryUI();
    }
    function updateHistoryUI() { document.getElementById('stats').textContent = `Particles: ${particles.length.toLocaleString()} | History: ${historyIndex + 1}/${history.length}`; }

    // Toast Notification
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.4s ease-in'; setTimeout(() => toast.remove(), 400); }, 1800);
    }

    // Enhanced Palette System with New Colors
    const PALETTES = [
      { name: 'Classic Pastel', colors: ['#f9c5d1', '#c9a7eb', '#a7c9eb', '#a7ebd4', '#f9e4c5', '#ebc5f9'] },
      { name: 'Sakura Pink', colors: ['#ffb3d9', '#ff99cc', '#ff80c0', '#f94fa6', '#f0457e', '#e63c6d'] },
      { name: 'Ocean Mist', colors: ['#b3e5e0', '#9dd9d2', '#87cdc4', '#71c1b6', '#5ab5a8', '#44a99a'] },
      { name: 'Lavender Dream', colors: ['#e0d5f5', '#d1bff0', '#c2a9eb', '#b393e6', '#a47de1', '#9567dc'] },
      { name: 'Sunset Peach', colors: ['#ffe8cc', '#ffd9b3', '#ffca99', '#ffbb80', '#ffac66', '#ff9d4d'] },
      { name: 'Mint Aurora', colors: ['#b3f5e8', '#99f0e6', '#7feae4', '#65e5e2', '#4ce0e0', '#32dbde'] },
      { name: 'Cosmic Purple', colors: ['#d9c2f5', '#ce9ff5', '#c27cf5', '#b659f5', '#aa36f5', '#9e13f5'] },
    ];
    let activePalette = [...PALETTES[0].colors];

    // Presets with Auto-Adjustment
    const PRESETS = {
      mandala: { mode: 'mandala', brushSize: 35, density: 10, speed: 5, glow: 4, palette: PALETTES[3].colors },
      ocean: { mode: 'wave', brushSize: 40, density: 12, speed: 6, glow: 4, palette: PALETTES[2].colors },
      desert: { mode: 'dune', brushSize: 50, density: 8, speed: 3, glow: 2, palette: PALETTES[4].colors },
      floral: { mode: 'bloom', brushSize: 30, density: 14, speed: 5, glow: 5, palette: PALETTES[1].colors },
      cosmic: { mode: 'fractal', brushSize: 32, density: 9, speed: 7, glow: 6, palette: PALETTES[6].colors },
    };

    function applyPreset(presetName) {
      const preset = PRESETS[presetName];
      if (!preset) return;
      mode = preset.mode;
      brushSize = preset.brushSize;
      density = preset.density;
      speedMult = preset.speed;
      glowAmount = preset.glow;
      activePalette = [...preset.palette];
      document.getElementById('brushSize').value = brushSize;
      document.getElementById('brushSizeVal').textContent = brushSize;
      document.getElementById('density').value = density;
      document.getElementById('densityVal').textContent = density;
      document.getElementById('speed').value = speedMult;
      document.getElementById('speedVal').textContent = speedMult;
      document.getElementById('glow').value = glowAmount;
      document.getElementById('glowVal').textContent = glowAmount;
      updateModeButtons();
      buildSwatches();
      showToast(`✨ Preset: ${presetName}`);
    }

    function updateModeButtons() { document.querySelectorAll('.mode-btn').forEach(btn => { btn.classList.toggle('active', btn.dataset.mode === mode); }); }

    // Mandala Controls
    let mandalaFolds = 8, mandalaFlip = false, showGuides = false;
    function snapToMandala(a, r) {
      const foldAngle = (Math.PI * 2) / mandalaFolds;
      const snapped = Math.round(a / foldAngle) * foldAngle;
      const diff = a - snapped;
      return -diff * (0.4 + Math.max(0, 1 - Math.abs(diff) / (foldAngle * 0.5)) * 0.8);
    }
    function drawMandalaGuides() {
      if (!showGuides || mode !== 'mandala') { guideCanvas.style.display = 'none'; return; }
      guideCanvas.style.display = 'block';
      guideCtx.clearRect(0, 0, W, H);
      guideCtx.strokeStyle = 'rgba(201,167,235,0.15)';
      guideCtx.lineWidth = 1;
      const cx = W / 2, cy = H / 2, foldAngle = (Math.PI * 2) / mandalaFolds;
      for (let i = 0; i < mandalaFolds; i++) {
        const angle = i * foldAngle;
        const x1 = cx + Math.cos(angle) * Math.min(W, H);
        const y1 = cy + Math.sin(angle) * Math.min(W, H);
        guideCtx.beginPath();
        guideCtx.moveTo(cx, cy);
        guideCtx.lineTo(x1, y1);
        guideCtx.stroke();
      }
      for (let r = 60; r < Math.min(W, H) / 2; r += 80) {
        guideCtx.beginPath();
        guideCtx.arc(cx, cy, r, 0, Math.PI * 2);
        guideCtx.stroke();
      }
    }

    // Particle Class & Flow Field
    const MODE_DAMPING = { gradient: 0.80, mandala: 0.78, wave: 0.79, chaos: 0.93, fractal: 0.81, bloom: 0.80, dune: 0.77 };
    const MODE_MAX_SPEED = { gradient: 2.2, mandala: 2.5, wave: 2.2, chaos: 5.0, fractal: 2.8, bloom: 2.5, dune: 2.0 };
    const MODE_HOME_PULL = { gradient: 0.012, mandala: 0.010, wave: 0.011, chaos: 0.0, fractal: 0.009, bloom: 0.008, dune: 0.013 };

    class Particle {
      constructor(x, y, color) {
        this.x = x; this.y = y; this.hx = x; this.hy = y;
        const nudge = mode === 'chaos' ? 0.7 : 0.18;
        this.vx = (Math.random() - 0.5) * nudge;
        this.vy = (Math.random() - 0.5) * nudge + 0.05;
        this.color = color;
        this.r = 0.4 + Math.random() * 0.6;
        this.alpha = 0;
        this.settled = false;
        this.life = 0;
        const lifeBase = mode === 'chaos' ? 110 : 50;
        const lifeRand = mode === 'chaos' ? 70 : 35;
        this.maxLife = lifeBase + Math.random() * lifeRand;
      }
    }

    function noise(x, y, t) { return Math.sin(x * 0.012 + t * 0.4) * Math.cos(y * 0.009 + t * 0.3) + Math.sin(x * 0.02 - y * 0.015 + t * 0.6) * 0.5; }

    function getFlow(x, y, t, modeKey) {
      let ax = 0, ay = 0;
      const nx = x / W, ny = y / H;
      switch (modeKey) {
        case 'gradient': {
          const n = noise(x * 0.008, y * 0.008, t * 0.3);
          const angle = n * Math.PI * 2;
          ax = Math.cos(angle) * 0.55;
          ay = Math.sin(angle) * 0.45 + 0.12;
          break;
        }
        case 'mandala': {
          const cx = W / 2, cy = H / 2;
          const dx = x - cx, dy = y - cy;
          const r = Math.sqrt(dx * dx + dy * dy) + 1;
          const a = Math.atan2(dy, dx);
          const tangent = a + Math.PI / 2;
          const spinStr = 1.2 * Math.max(0.1, 1 - r / (Math.min(W, H) * 0.48));
          const ringSpacing = 80;
          const nearestRing = Math.round(r / ringSpacing) * ringSpacing;
          const radialPull = (nearestRing - r) * 0.018;
          const angularSnap = snapToMandala(a, r);
          ax = Math.cos(tangent) * spinStr + (cx - x) / r * 0.12 + Math.cos(a) * radialPull + Math.cos(tangent) * angularSnap;
          ay = Math.sin(tangent) * spinStr + (cy - y) / r * 0.12 + Math.sin(a) * radialPull + Math.sin(tangent) * angularSnap;
          break;
        }
        case 'wave': {
          const r1 = Math.sin(nx * Math.PI * 5 + t * 0.8);
          const r2 = Math.sin(ny * Math.PI * 3 + t * 0.5) * 0.5;
          const r3 = Math.sin((nx + ny) * Math.PI * 4 + t * 0.6) * 0.3;
          const flowAngle = (r1 + r2 + r3) * Math.PI * 0.45;
          ax = Math.cos(flowAngle) * 1.1;
          ay = Math.sin(flowAngle) * 0.5 + Math.sin(nx * Math.PI * 2 + t * 0.3) * 0.15;
          break;
        }
        case 'chaos': {
          const a1 = noise(x * 0.015 + 100, y * 0.015, t * 1.2) * Math.PI * 4;
          const a2 = noise(x * 0.008, y * 0.012 + 200, t * 0.8) * Math.PI * 4;
          const cx = W / 2, cy = H / 2;
          ax = Math.sin(a1) * 2.2 + Math.cos(a2) * 0.8 + (cx - x) / W * 0.5;
          ay = Math.cos(a1) * 2.2 + Math.sin(a2) * 0.8 + (cy - y) / H * 0.5;
          break;
        }
        case 'fractal': {
          const lvl = noise(x * 0.02, y * 0.02, t * 0.25);
          const branch = Math.floor(((lvl + 1) / 2) * 3);
          const angles = [Math.PI * 0.1, -Math.PI * 0.35, Math.PI * 0.6];
          const ba = angles[branch] + t * 0.05;
          ax = Math.cos(ba) * 1.2;
          ay = Math.sin(ba) * 1.0 + 0.25;
          break;
        }
        case 'bloom': {
          const cx = mouse.x, cy = mouse.y;
          const dx = x - cx, dy = y - cy;
          const r = Math.sqrt(dx * dx + dy * dy) + 1;
          const a = Math.atan2(dy, dx);
          const petalStep = (Math.PI * 2) / 5;
          const nearestPetal = Math.round(a / petalStep) * petalStep;
          const petalDiff = a - nearestPetal;
          const petalSnap = -petalDiff * 0.55;
          const pulse = Math.sin(r * 0.035 - t * 1.0) * 0.9;
          const petalLen = 1.0 - Math.min(r / (brushSize * 3), 1);
          ax = (Math.cos(a) * pulse + Math.cos(nearestPetal) * petalLen * 0.4) + Math.cos(a + Math.PI / 2) * petalSnap;
          ay = (Math.sin(a) * pulse + Math.sin(nearestPetal) * petalLen * 0.4) + Math.sin(a + Math.PI / 2) * petalSnap;
          break;
        }
        case 'dune': {
          const shelf = Math.sin(nx * Math.PI * 3 + t * 0.12) * 0.5 + Math.sin(nx * Math.PI * 6 + t * 0.08) * 0.25;
          ax = shelf * 0.8;
          ay = (1.0 - Math.abs(shelf)) * 1.2 + 0.15;
          break;
        }
      }
      return { ax, ay };
    }

    function hexToRgb(hex) { const r = parseInt(hex.slice(1, 3), 16); const g = parseInt(hex.slice(3, 5), 16); const b = parseInt(hex.slice(5, 7), 16); return { r, g, b }; }
    function interpolateColor(c1, c2, t) { const a = hexToRgb(c1), b = hexToRgb(c2); return `rgb(${Math.round(a.r + (b.r - a.r) * t)},${Math.round(a.g + (b.g - a.g) * t)},${Math.round(a.b + (b.b - a.b) * t)})`; }
    function randomPastel() { const h = Math.random() * 360; return `hsl(${h},70%,80%)`; }
    function getParticleColor(x, y) {
      if (activePalette.length < 2) return currentColor;
      const t = ((x / W + y / H) * 0.5 + time * 0.01) % 1;
      const idx = Math.floor(t * (activePalette.length - 1));
      const frac = (t * (activePalette.length - 1)) - idx;
      return interpolateColor(activePalette[idx], activePalette[Math.min(idx + 1, activePalette.length - 1)], frac);
    }

    function spawnAt(mx, my) {
      const count = density;
      for (let i = 0; i < count; i++) {
        let x, y;
        if (mode === 'mandala') {
          const a = (i / count) * Math.PI * 2 + Math.random() * 0.4;
          const r = brushSize * (0.5 + Math.random() * 0.5);
          x = mx + Math.cos(a) * r;
          y = my + Math.sin(a) * r;
        } else if (mode === 'fractal') {
          const branch = Math.floor(Math.random() * 3);
          const ba = (branch / 3) * Math.PI * 2;
          const r = Math.random() * brushSize;
          x = mx + Math.cos(ba) * r * 0.7 + (Math.random() - 0.5) * brushSize * 0.4;
          y = my + Math.sin(ba) * r * 0.7 + (Math.random() - 0.5) * brushSize * 0.4;
        } else if (mode === 'bloom') {
          const a = Math.random() * Math.PI * 2;
          const r = Math.pow(Math.random(), 0.5) * brushSize;
          x = mx + Math.cos(a) * r;
          y = my + Math.sin(a) * r;
        } else if (mode === 'chaos') {
          x = mx + (Math.random() - 0.5) * brushSize * 2.5;
          y = my + (Math.random() - 0.5) * brushSize * 2.5;
        } else {
          const angle = Math.random() * Math.PI * 2;
          const rad = Math.random() * brushSize;
          x = mx + Math.cos(angle) * rad;
          y = my + Math.sin(angle) * rad;
        }
        const col = currentColor === '__palette__' ? getParticleColor(x, y) : currentColor;
        particles.push(new Particle(x, y, col));
      }
    }

    function spawnParticles(mx, my) {
      const dx = mx - mouse.px, dy = my - mouse.py;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const step = Math.max(brushSize * 0.35, 3);
      const steps = Math.max(1, Math.ceil(dist / step));
      for (let s = 0; s <= steps; s++) {
        const t = steps === 1 ? 1 : s / steps;
        const interpX = mouse.px + dx * t;
        const interpY = mouse.py + dy * t;
        const speedFactor = Math.min(dist / 40, 1);
        const adjustedDensity = Math.ceil(density * (0.6 + speedFactor * 0.4));
        const oldDensity = density;
        density = adjustedDensity;
        spawnAt(interpX, interpY);
        density = oldDensity;
      }
    }

    function update() {
      time++;
      const sp = 0.3 + (speedMult - 1) / 9 * 1.2;
      const damp = MODE_DAMPING[mode] ?? 0.82;
      const maxSpd = MODE_MAX_SPEED[mode] ?? 2.5;
      const homePull = MODE_HOME_PULL[mode] ?? 0.010;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        if (p.settled) { p.vx = 0; p.vy = 0; p.alpha = 1.0; continue; }
        p.life++;
        p.alpha = Math.min(p.life / 18, 1.0);
        const { ax, ay } = getFlow(p.x, p.y, time * 0.025, mode);
        p.vx += ax * sp * 0.07;
        p.vy += ay * sp * 0.07;
        const ageRatio = p.life / p.maxLife;
        const pull = homePull * (0.5 + ageRatio * 1.5);
        p.vx += (p.hx - p.x) * pull;
        p.vy += (p.hy - p.y) * pull;
        p.vx *= damp;
        p.vy *= damp;
        const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (spd > maxSpd) { const scale = maxSpd / spd; p.vx *= scale; p.vy *= scale; }
        p.x += p.vx;
        p.y += p.vy;
        const margin = 4;
        if (p.x < margin) { p.x = margin; p.vx *= -0.3; }
        if (p.x > W - margin) { p.x = W - margin; p.vx *= -0.3; }
        if (p.y < margin) { p.y = margin; p.vy *= -0.3; }
        if (p.y > H - margin) { p.y = H - margin; p.vy *= -0.3; }
        const distHome = Math.hypot(p.x - p.hx, p.y - p.hy);
        const nearStop = spd < 0.08 && distHome < brushSize * 1.4;
        if (p.life > p.maxLife || nearStop) { p.settled = true; p.vx = 0; p.vy = 0; }
      }
      if (particles.length > 22000) { particles.splice(0, particles.length - 22000); }
    }

    function render() {
      // PERSISTENT RENDERING: Canvas is NOT cleared each frame
      // All particles are permanently drawn and accumulated
      const g = glowAmount;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        ctx.save();
        if (g > 0) { ctx.shadowBlur = g * 2 + (mode === 'wave' ? 4 : 0); ctx.shadowColor = p.color; }
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        if (mode === 'wave') { ctx.ellipse(p.x, p.y, p.r * 1.3, p.r * 0.85, p.vx ? Math.atan2(p.vy, p.vx) : 0, 0, Math.PI * 2); }
        else { ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); }
        ctx.fill();
        ctx.restore();
      }
      updateHistoryUI();
    }

    function loop() {
      if (!paused) { update(); render(); drawMandalaGuides(); }
      requestAnimationFrame(loop);
    }
    loop();

    // Web Audio
    let audioCtx = null, audioEnabled = false, masterGain, noiseSource, filterNode, lfoGain, lfoOsc, reverbNode, delayNode;
    let audioVolume = 0.6, soundStyle = 'sand', currentAudioGain = 0;
    const VIZ_BARS = 8, vizEls = Array.from({ length: VIZ_BARS }, (_, i) => document.getElementById('vb' + i));

    function createReverb(ctx, duration = 1.8, decay = 2.0) {
      const sampleRate = ctx.sampleRate;
      const length = sampleRate * duration;
      const impulse = ctx.createBuffer(2, length, sampleRate);
      for (let c = 0; c < 2; c++) {
        const d = impulse.getChannelData(c);
        for (let i = 0; i < length; i++) { d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay); }
      }
      const conv = ctx.createConvolver();
      conv.buffer = impulse;
      return conv;
    }

    function buildAudioGraph() {
      if (audioCtx) { audioCtx.close(); }
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0;
      masterGain.connect(audioCtx.destination);
      const bufLen = audioCtx.sampleRate * 2;
      const noiseBuf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
      const noiseData = noiseBuf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) noiseData[i] = Math.random() * 2 - 1;
      noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = noiseBuf;
      noiseSource.loop = true;
      filterNode = audioCtx.createBiquadFilter();
      lfoOsc = audioCtx.createOscillator();
      lfoGain = audioCtx.createGain();
      lfoOsc.connect(lfoGain);
      reverbNode = createReverb(audioCtx);
      delayNode = audioCtx.createDelay(0.5);
      const delayFeed = audioCtx.createGain();
      delayNode.connect(delayFeed);
      delayFeed.connect(delayNode);
      applyStylePreset(soundStyle);
      noiseSource.connect(filterNode);
      filterNode.connect(reverbNode);
      reverbNode.connect(masterGain);
      filterNode.connect(masterGain);
      lfoGain.connect(masterGain.gain);
      lfoOsc.start();
      noiseSource.start();
    }

    function applyStylePreset(style) {
      if (!audioCtx) return;
      switch (style) {
        case 'sand': filterNode.type = 'bandpass'; filterNode.frequency.value = 900; filterNode.Q.value = 0.6; lfoOsc.frequency.value = 3.5; lfoGain.gain.value = 0.004; delayNode.delayTime.value = 0.15; break;
        case 'piano': filterNode.type = 'bandpass'; filterNode.frequency.value = 520; filterNode.Q.value = 12; lfoOsc.type = 'sine'; lfoOsc.frequency.value = 0.18; lfoGain.gain.value = 0.012; delayNode.delayTime.value = 0.38; break;
        case 'ocean': filterNode.type = 'lowpass'; filterNode.frequency.value = 320; filterNode.Q.value = 1.2; lfoOsc.frequency.value = 0.25; lfoGain.gain.value = 0.01; delayNode.delayTime.value = 0.45; break;
        case 'ambient': filterNode.type = 'bandpass'; filterNode.frequency.value = 600; filterNode.Q.value = 2.5; lfoOsc.frequency.value = 1.2; lfoGain.gain.value = 0.008; delayNode.delayTime.value = 0.35; break;
      }
    }

    function initAudio() { if (!audioCtx) buildAudioGraph(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

    let lastMouseSpeed = 0, drawActivityLevel = 0, audioRafId = null;
    function updateAudioEngine() {
      if (!audioEnabled || !audioCtx) return;
      drawActivityLevel *= 0.88;
      currentAudioGain += (drawActivityLevel - currentAudioGain) * 0.06;
      const targetGain = currentAudioGain * audioVolume * 0.045;
      masterGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.08);
      const speedNorm = Math.min(lastMouseSpeed / 30, 1);
      const baseFreq = { sand: 900, piano: 520, ocean: 320, ambient: 600 }[soundStyle] || 700;
      const targetFreq = baseFreq * (0.7 + speedNorm * 1.1);
      filterNode.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.15);
      const level = currentAudioGain;
      vizEls.forEach((bar, i) => { const h = Math.max(2, level * (14 + Math.sin(Date.now() * 0.003 + i * 0.9) * 6) * 1.3); bar.style.height = Math.round(h) + 'px'; });
      audioRafId = requestAnimationFrame(updateAudioEngine);
    }

    function startAudioLoop() { if (audioRafId) cancelAnimationFrame(audioRafId); updateAudioEngine(); }
    function triggerAudio(speed, particleCount) { if (!audioEnabled) return; initAudio(); const speedFactor = Math.min(speed / 20, 1); const densityFactor = Math.min(particleCount / 8000, 1); drawActivityLevel = Math.min(1, drawActivityLevel + speedFactor * 0.25 + densityFactor * 0.1 + 0.15); lastMouseSpeed = speed; }
    function stopAudioGradually() { drawActivityLevel *= 0.5; }

    // UI: Audio
    document.getElementById('audioToggle').addEventListener('click', () => {
      audioEnabled = !audioEnabled;
      const track = document.getElementById('audioTrack');
      const label = document.getElementById('audioLabel');
      track.classList.toggle('on', audioEnabled);
      label.textContent = audioEnabled ? 'On' : 'Off';
      if (audioEnabled) { initAudio(); startAudioLoop(); }
      else { if (audioCtx) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3); if (audioRafId) { cancelAnimationFrame(audioRafId); audioRafId = null; } vizEls.forEach(b => b.style.height = '2px'); }
    });

    slider('audioVolume', 'audioVolumeVal', v => { audioVolume = v / 100; });
    document.querySelectorAll('.sound-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        soundStyle = btn.dataset.sound;
        if (audioCtx) applyStylePreset(soundStyle);
      });
    });

    // Mouse & Touch
    function hideTooltip() { const tip = document.getElementById('tooltip'); if (tip && tip.style.opacity !== '0') { tip.style.transition = 'opacity 1s'; tip.style.opacity = '0'; setTimeout(() => tip.remove(), 1000); } }
    canvas.addEventListener('mousedown', e => { hideTooltip(); mouse.px = e.clientX; mouse.py = e.clientY; mouse.x = e.clientX; mouse.y = e.clientY; isDrawing = true; spawnAt(mouse.x, mouse.y); if (audioEnabled) initAudio(); saveHistory(); });
    canvas.addEventListener('mouseup', e => { isDrawing = false; stopAudioGradually(); });
    canvas.addEventListener('mouseleave', e => { isDrawing = false; stopAudioGradually(); });
    canvas.addEventListener('mousemove', e => {
      mouse.px = mouse.x; mouse.py = mouse.y;
      mouse.x = e.clientX; mouse.y = e.clientY;
      mouse.vx = mouse.x - mouse.px;
      mouse.vy = mouse.y - mouse.py;
      const speed = Math.sqrt(mouse.vx * mouse.vx + mouse.vy * mouse.vy);
      if (isDrawing) {
        spawnParticles(mouse.x, mouse.y);
        triggerAudio(speed, particles.length);
      }
      const cursor = document.getElementById('brushCursor');
      cursor.style.width = (brushSize * 2) + 'px';
      cursor.style.height = (brushSize * 2) + 'px';
      cursor.style.left = mouse.x + 'px';
      cursor.style.top = mouse.y + 'px';
    });
    canvas.addEventListener('click', e => { spawnParticles(e.clientX, e.clientY); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); hideTooltip(); isDrawing = true; if (audioEnabled) initAudio(); const t = e.touches[0]; mouse.px = t.clientX; mouse.py = t.clientY; mouse.x = t.clientX; mouse.y = t.clientY; spawnAt(mouse.x, mouse.y); saveHistory(); }, { passive: false });
    canvas.addEventListener('touchend', e => { e.preventDefault(); isDrawing = false; stopAudioGradually(); }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      const px = mouse.x, py = mouse.y;
      mouse.x = t.clientX; mouse.y = t.clientY;
      const speed = Math.sqrt((mouse.x - px) ** 2 + (mouse.y - py) ** 2);
      mouse.px = px; mouse.py = py;
      if (isDrawing) { spawnParticles(mouse.x, mouse.y); triggerAudio(speed, particles.length); }
    }, { passive: false });
    canvas.addEventListener('wheel', e => { e.preventDefault(); brushSize = Math.max(5, Math.min(80, brushSize - e.deltaY * 0.1)); document.getElementById('brushSize').value = brushSize; document.getElementById('brushSizeVal').textContent = Math.round(brushSize); }, { passive: false });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.code === 'KeyZ' && e.ctrlKey) { e.preventDefault(); undo(); }
      if (e.code === 'KeyY' && e.ctrlKey) { e.preventDefault(); redo(); }
      if (e.code === 'KeyF') { e.preventDefault(); document.body.classList.toggle('focus-mode'); document.getElementById('panel').style.display = document.body.classList.contains('focus-mode') ? 'none' : 'flex'; }
    });

    // UI: Mode & Controls
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        mode = btn.dataset.mode;
        updateModeButtons();
        if (mode === 'mandala') { document.getElementById('mandalaControls').style.display = 'block'; }
        else { document.getElementById('mandalaControls').style.display = 'none'; guideCanvas.style.display = 'none'; }
      });
    });

    document.querySelectorAll('.sym-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mandalaFolds = parseInt(btn.dataset.folds);
      });
    });

    document.getElementById('mirrorTrack').addEventListener('click', () => {
      mandalaFlip = !mandalaFlip;
      const track = document.getElementById('mirrorTrack');
      const label = document.getElementById('mirrorLabel');
      track.classList.toggle('on', mandalaFlip);
      label.textContent = mandalaFlip ? 'On' : 'Off';
    });

    document.getElementById('guideTrack').addEventListener('click', () => {
      showGuides = !showGuides;
      const track = document.getElementById('guideTrack');
      const label = document.getElementById('guideLabel');
      track.classList.toggle('on', showGuides);
      label.textContent = showGuides ? 'On' : 'Off';
    });

    function slider(id, valId, cb) {
      const el = document.getElementById(id);
      const vl = document.getElementById(valId);
      el.addEventListener('input', () => { vl.textContent = el.value; cb(+el.value); });
    }
    slider('brushSize', 'brushSizeVal', v => brushSize = v);
    slider('density', 'densityVal', v => density = v);
    slider('speed', 'speedVal', v => speedMult = v);
    slider('glow', 'glowVal', v => glowAmount = v);

    function buildSwatches() {
      const container = document.getElementById('swatches');
      container.innerHTML = '';
      activePalette.forEach((col, i) => {
        const s = document.createElement('div');
        s.className = 'swatch' + (i === 0 ? ' active' : '');
        s.style.background = col;
        s.addEventListener('click', () => {
          document.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
          s.classList.add('active');
          currentColor = col;
          document.getElementById('colorPicker').value = col;
        });
        container.appendChild(s);
      });
      currentColor = activePalette[0];
      document.getElementById('colorPicker').value = activePalette[0];
    }
    buildSwatches();

    document.getElementById('colorPicker').addEventListener('input', e => { currentColor = e.target.value; document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active')); });
    document.getElementById('randomPalette').addEventListener('click', () => { activePalette = Array.from({ length: 6 }, () => randomPastel()); buildSwatches(); });

    function buildNamedPalettes() {
      const container = document.getElementById('namedPalettes');
      container.innerHTML = '';
      PALETTES.forEach((pal, i) => {
        const s = document.createElement('div');
        s.className = 'pal-swatch';
        s.style.background = `linear-gradient(45deg, ${pal.colors[0]}, ${pal.colors[pal.colors.length - 1]})`;
        s.title = pal.name;
        s.addEventListener('click', () => {
          document.querySelectorAll('.pal-swatch').forEach(sw => sw.classList.remove('active'));
          s.classList.add('active');
          activePalette = [...pal.colors];
          buildSwatches();
          showToast(`🎨 ${pal.name}`);
        });
        container.appendChild(s);
      });
    }
    buildNamedPalettes();

    document.getElementById('pauseBtn').addEventListener('click', () => { paused = !paused; document.getElementById('pauseBtn').textContent = paused ? '▶ Resume' : '⏸ Pause'; });
    document.getElementById('clearBtn').addEventListener('click', () => {
      particles = [];
      history = [];
      historyIndex = -1;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0d0a14';
      ctx.fillRect(0, 0, W, H);
      saveHistory();
      showToast('🗑 Canvas cleared');
    });
    document.getElementById('panel-toggle').addEventListener('click', () => { panelVisible = !panelVisible; document.getElementById('panel').style.display = panelVisible ? 'flex' : 'none'; });

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyPreset(btn.dataset.preset);
      });
    });

    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('redoBtn').addEventListener('click', redo);

    document.getElementById('saveBtn').addEventListener('click', () => {
      const now = new Date();
      const dateStr = now.toISOString().slice(0, 19).replace(/:/g, '-');
      const filename = `sand-art-${dateStr}.png`;
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = filename;
      link.click();
      showToast(`💾 Saved: ${filename}`);
    });

    document.getElementById('focusBtn').addEventListener('click', () => {
      document.body.classList.toggle('focus-mode');
      document.getElementById('panel').style.display = document.body.classList.contains('focus-mode') ? 'none' : 'flex';
    });

    ctx.fillStyle = '#0d0a14';
    ctx.fillRect(0, 0, W, H);

    // Tooltip will fade out on first interaction

    saveHistory();
  </script>
</body>

</html>
